<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login – NigeriaVotes</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --green: #008751; --green-dark: #005c38; }
    body {
        font-family: 'Sora', sans-serif;
        background: linear-gradient(135deg, var(--green-dark) 0%, var(--green) 100%);
        min-height: 100vh;
        display: flex; align-items: center; justify-content: center;
    }
    .login-card {
        background: white;
        border-radius: 24px;
        padding: 3rem;
        width: min(420px, 95vw);
        box-shadow: 0 24px 64px rgba(0,0,0,.3);
        text-align: center;
    }
    .logo { font-size: 3rem; margin-bottom: 1rem; }
    h1 { font-size: 1.5rem; font-weight: 800; margin-bottom: .25rem; }
    p { color: #6b7280; font-size: .9rem; margin-bottom: 2rem; }
    .form-group { margin-bottom: 1.25rem; text-align: left; }
    .form-label { display: block; font-size: .78rem; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: #6b7280; margin-bottom: .4rem; }
    .form-control { width: 100%; padding: .75rem 1rem; border: 1.5px solid #e5e7eb; border-radius: 10px; font-family: inherit; font-size: .9rem; transition: border-color .2s; }
    .form-control:focus { outline: none; border-color: var(--green); box-shadow: 0 0 0 3px rgba(0,135,81,.15); }
    .btn { width: 100%; padding: .9rem; background: var(--green); color: white; border: none; border-radius: 10px; font-family: inherit; font-size: 1rem; font-weight: 700; cursor: pointer; transition: background .2s; }
    .btn:hover { background: var(--green-dark); }
    .alert { padding: .8rem 1rem; background: #fef2f2; color: #991b1b; border-radius: 10px; font-size: .85rem; margin-bottom: 1.25rem; border-left: 4px solid #dc2626; text-align: left; }
</style>
</head>
<body>
<div class="login-card">
    <div class="logo">🔐</div>
    <h1>Admin Access</h1>
    <p>NigeriaVotes Election Management System</p>

    {% for message in messages %}
    <div class="alert">❌ {{ message }}</div>
    {% endfor %}

    <form method="post" novalidate>
        {% csrf_token %}
        <div class="form-group">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-control" placeholder="Admin username" required autofocus>
        </div>
        <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" placeholder="Password" required>
        </div>
        <button type="submit" class="btn">Login to Admin Panel</button>
    </form>
    <p style="margin-top:1.5rem;font-size:.78rem;color:#9ca3af;">Authorized INEC personnel only</p>
</div>
</body>
</html>
