# nginx.conf — NigeriaVotes Production Configuration
# Place in /etc/nginx/sites-available/nigerialvotes
# Then: sudo ln -s /etc/nginx/sites-available/nigerialvotes /etc/nginx/sites-enabled/

upstream django {
    server 127.0.0.1:8000;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # SSL certificates (use certbot / Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header X-Frame-Options           "DENY"                always;
    add_header X-Content-Type-Options    "nosniff"             always;
    add_header X-XSS-Protection          "1; mode=block"       always;
    add_header Referrer-Policy           "strict-origin"       always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline' https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src https://fonts.gstatic.com; img-src 'self' data:; media-src 'self'; connect-src 'self';" always;

    # Logs
    access_log /var/log/nginx/nigerialvotes_access.log;
    error_log  /var/log/nginx/nigerialvotes_error.log;

    # Max upload size (for face images)
    client_max_body_size 10M;

    # Static files
    location /static/ {
        alias /path/to/evoting_project/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Media files
    location /media/ {
        alias /path/to/evoting_project/media/;
        expires 7d;
        # Protect biometric data — only serve candidate photos
        location /media/voter_images/ {
            deny all;
            return 403;
        }
    }

    # Proxy to Django/Gunicorn
    location / {
        proxy_pass         http://django;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # Rate limit the API auth endpoint
    location /api/authenticate/ {
        limit_req zone=auth_limit burst=5 nodelay;
        proxy_pass http://django;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

# Rate limiting zone (define in nginx.conf http block)
# limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=3r/m;
